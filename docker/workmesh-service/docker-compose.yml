services:
  workmesh-service:
    build:
      context: ../..
      dockerfile: docker/workmesh-service/Dockerfile
    image: workmesh-service:local
    restart: unless-stopped
    ports:
      - "4747:4747"
    volumes:
      - "${WORKMESH_REPO_ROOT:?set WORKMESH_REPO_ROOT}:/workspace"
      - "${HOME}/.workmesh:/home/workmesh/.workmesh"
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "4747"
      - "--auth-token"
      - "${WORKMESH_AUTH_TOKEN:?set WORKMESH_AUTH_TOKEN}"
